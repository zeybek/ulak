name: Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MAKE_FLAGS: "ENABLE_KAFKA=1 ENABLE_MQTT=1 ENABLE_REDIS=1 ENABLE_AMQP=1 ENABLE_NATS=1"
  PROTOCOL_DEPS: >-
    libcurl4-openssl-dev
    librdkafka-dev
    libhiredis-dev
    libmosquitto-dev
    librabbitmq-dev
    libnats-dev
    libssl-dev

jobs:
  static-analysis:
    if: ${{ !github.event.pull_request.draft }}
    name: Static Analysis
    uses: ./.github/workflows/_reusable-static-analysis.yml

  regress:
    if: ${{ !github.event.pull_request.draft }}
    strategy:
      fail-fast: false
      matrix:
        pg: [18, 17, 16, 15, 14]
    name: PG ${{ matrix.pg }} — Regress
    uses: ./.github/workflows/_reusable-regression.yml
    with:
      pg-version: ${{ matrix.pg }}
      make-flags: ENABLE_KAFKA=1 ENABLE_MQTT=1 ENABLE_REDIS=1 ENABLE_AMQP=1 ENABLE_NATS=1
      protocol-deps: >-
        libcurl4-openssl-dev
        librdkafka-dev
        libhiredis-dev
        libmosquitto-dev
        librabbitmq-dev
        libnats-dev
        libssl-dev

  tap:
    if: ${{ !github.event.pull_request.draft }}
    strategy:
      fail-fast: false
      matrix:
        pg: [18, 17, 16, 15, 14]
    name: PG ${{ matrix.pg }} — TAP
    uses: ./.github/workflows/_reusable-tap.yml
    with:
      pg-version: ${{ matrix.pg }}
      make-flags: ENABLE_KAFKA=1 ENABLE_MQTT=1 ENABLE_REDIS=1 ENABLE_AMQP=1 ENABLE_NATS=1
      protocol-deps: >-
        libcurl4-openssl-dev
        librdkafka-dev
        libhiredis-dev
        libmosquitto-dev
        librabbitmq-dev
        libnats-dev
        libssl-dev

  sanitizers:
    if: ${{ !github.event.pull_request.draft }}
    name: ASan + UBSan
    uses: ./.github/workflows/_reusable-sanitizers.yml
    with:
      make-flags: ENABLE_KAFKA=1 ENABLE_MQTT=1 ENABLE_REDIS=1 ENABLE_AMQP=1 ENABLE_NATS=1
      protocol-deps: >-
        libcurl4-openssl-dev
        librdkafka-dev
        libhiredis-dev
        libmosquitto-dev
        librabbitmq-dev
        libnats-dev
        libssl-dev

  clang-tidy:
    if: ${{ !github.event.pull_request.draft }}
    name: clang-tidy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -i -v 18
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22
          sudo apt-get update
          sudo apt-get install -y \
            postgresql-server-dev-18 \
            ${{ env.PROTOCOL_DEPS }} \
            clang-tidy-22 \
            bear

      - name: Show tool versions
        run: |
          clang-tidy-22 --version
          bear --version

      - name: Generate compile_commands.json
        run: bear -- make ${{ env.MAKE_FLAGS }}

      - name: Run clang-tidy
        run: |
          find src -name "*.c" | \
            xargs clang-tidy-22 -p . \
              --warnings-as-errors='clang-analyzer-core.*,bugprone-null-dereference' \
              2>&1 | tee clang-tidy-output.txt
          echo ""
          WARNS=$(grep -c "warning:" clang-tidy-output.txt || echo 0)
          echo "::notice::clang-tidy: $WARNS warning(s)"

      - name: Upload clang-tidy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-output.txt
